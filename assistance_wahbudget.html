<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>WahBudget - Help Center</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      max-width: 500px;
      width: 90%;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 90px;
      height: auto;
      margin-bottom: 15px;
    }

    h1 {
      color: #1a2a3a;
      font-size: 1.6em;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      line-height: 1.6;
      margin: 15px 0;
    }

    .contact-link {
      display: inline-block;
      padding: 12px 24px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .contact-link:hover {
      background: #0056b3;
    }

    .footer {
      margin-top: 25px;
      border-top: 1px solid #eee;
      padding-top: 15px;
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="wahbudget.png" alt="WahBudget Logo" class="logo">

    <h1>Help Center</h1>
    <p>
      If you encounter any issues or have any questions, please feel free to reach out to us via email:
    </p>

    <a href="mailto:h.dali.youcef@gmail.com" class="contact-link">📧 h.dali.youcef@gmail.com</a>

    <div class="footer">
      <p>We are here to help you at any time.</p>
    </div>
  </div>
</body>
</html>
