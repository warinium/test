<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - ItzyBlitz Media</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --accent-color: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
            margin: 20px;
        }

        .header {
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .address-box {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .email-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .email-link:hover {
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            text-align: center;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="header">
            <h1>Contact Information</h1>
        </div>

        <div class="section">
            <span class="label">Developer Name</span>
            <div class="value">ItzyBlitz Media</div>
        </div>

        <div class="section">
            <span class="label">Account Owner</span>
            <div class="value">
                Christian Neiderstam<br>
                <a href="mailto:sportspotnews@gmail.com" class="email-link">sportspotnews@gmail.com</a>
            </div>
        </div>

        <div class="section">
            <span class="label">Organisation Details</span>
            <div class="value">C&C Bygg i Blentarp AB</div>
            <div class="address-box">
                Kumlatoftavägen 527<br>
                275 63 Blentarp<br>
                Sweden (SE)
            </div>
        </div>

        <div class="footer-note">
            &copy; 2026 ItzyBlitz Media - Tous droits réservés.
        </div>
    </div>

</body>
</html>
